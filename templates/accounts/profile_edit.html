{% extends 'base.html' %}

{% block page_title %}Edit profile{% endblock %}
{% block page_subtitle %}Update your information{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="bg-white border border-gray-200 rounded-md overflow-hidden">
        <div class="px-5 py-3 bg-gray-50 border-b border-gray-200"><h2 class="font-semibold text-gray-900">Edit profile</h2></div>
        <div class="p-5">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3"><label class="block text-sm font-medium text-gray-700 mb-1">Username</label><input type="text" value="{{ user.username }}" disabled class="form-input bg-gray-50"></div>
                <div class="mb-3"><label class="block text-sm font-medium text-gray-700 mb-1">Email <span class="text-red-500">*</span></label><input type="email" name="email" value="{{ user.email }}" required class="form-input"></div>
                <div class="grid grid-cols-2 gap-3 mb-3"><div><label class="block text-sm font-medium text-gray-700 mb-1">First name</label><input type="text" name="first_name" value="{{ user.first_name }}" class="form-input"></div><div><label class="block text-sm font-medium text-gray-700 mb-1">Last name</label><input type="text" name="last_name" value="{{ user.last_name }}" class="form-input"></div></div>
                <div class="mb-3"><label class="block text-sm font-medium text-gray-700 mb-1">Phone</label><input type="tel" name="phone_number" value="{{ user.profile.phone_number }}" class="form-input"></div>
                <div class="mb-4"><label class="block text-sm font-medium text-gray-700 mb-1">Address</label><textarea name="address" rows="3" class="form-input">{{ user.profile.address }}</textarea></div>
                <div class="flex gap-2"><button type="submit" class="btn-primary flex-1 text-center">Save changes</button><a href="{% url 'accounts:profile_view' %}" class="btn-secondary flex-1 text-center">Cancel</a></div>
            </form>
        </div>
    </div>
    <div class="mt-4 bg-white border border-gray-200 rounded-md overflow-hidden">
        <div class="px-5 py-3 bg-gray-50 border-b border-gray-200"><h2 class="font-semibold text-gray-900">Password</h2></div>
        <div class="p-5"><p class="text-gray-600 text-sm mb-3">Change your password to keep your account secure.</p><a href="{% url 'account_change_password' %}" class="btn-secondary">Change password</a></div>
    </div>
</div>
{% endblock %}
