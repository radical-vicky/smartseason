{% extends 'base.html' %}
{% load static %}

{% block auth_content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div class="font-bold text-2xl text-green-800">SmartSeason</div>
            <div class="text-gray-500 text-sm mt-1">Field Monitoring System</div>
        </div>
        
        <div class="bg-white border border-gray-200 rounded-md shadow-sm overflow-hidden">
            <div class="px-6 py-4 bg-yellow-600">
                <h2 class="text-lg font-semibold text-white">Sign out</h2>
                <p class="text-yellow-100 text-sm">Confirm logout</p>
            </div>
            
            <div class="p-6 text-center">
                <p class="text-gray-700 mb-6">Are you sure you want to sign out?</p>
                
                <form method="post" action="{% url 'account_logout' %}">
                    {% csrf_token %}
                    <div class="flex gap-3">
                        <button type="submit" class="flex-1 bg-red-600 text-white py-2 rounded-md hover:bg-red-700 transition">
                            Sign out
                        </button>
                        <a href="{% url 'dashboard' %}" class="flex-1 bg-gray-200 text-gray-700 py-2 rounded-md hover:bg-gray-300 transition text-center">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
