{% extends 'base.html' %}
{% load static %}

{% block auth_content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div class="font-bold text-2xl text-green-800">SmartSeason</div>
            <div class="text-gray-500 text-sm mt-1">Field Monitoring System</div>
        </div>
        
        <div class="bg-white border border-gray-200 rounded-md shadow-sm overflow-hidden">
            <div class="px-6 py-4 bg-green-800">
                <h2 class="text-lg font-semibold text-white">Sign in</h2>
                <p class="text-green-100 text-sm">Access your account</p>
            </div>
            
            <div class="p-6">
                <form method="post" action="{% url 'account_login' %}">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Username or email</label>
                        <input type="text" name="login" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-green-700">
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" name="password" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-green-700">
                    </div>
                    
                    <div class="flex items-center justify-between mb-6">
                        <label class="flex items-center">
                            <input type="checkbox" name="remember" class="h-4 w-4 text-green-700 rounded border-gray-300">
                            <span class="ml-2 text-sm text-gray-600">Remember me</span>
                        </label>
                        <a href="{% url 'account_reset_password' %}" class="text-sm text-green-700 hover:underline">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="w-full bg-green-800 text-white py-2 rounded-md hover:bg-green-900 transition">
                        Sign in
                    </button>
                </form>
                
                <div class="text-center mt-6 pt-4 border-t border-gray-200">
                    <p class="text-sm text-gray-600">
                        Don't have an account?
                        <a href="{% url 'account_signup' %}" class="text-green-700 hover:underline">Sign up</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
