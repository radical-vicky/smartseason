{% extends 'base.html' %}
{% load static %}

{% block auth_content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div class="font-bold text-2xl text-green-800">SmartSeason</div>
            <div class="text-gray-500 text-sm mt-1">Field Monitoring System</div>
        </div>
        
        <div class="bg-white border border-gray-200 rounded-md shadow-sm overflow-hidden">
            <div class="px-6 py-4 bg-blue-600">
                <h2 class="text-lg font-semibold text-white">Reset password</h2>
                <p class="text-blue-100 text-sm">Enter your email to reset your password</p>
            </div>
            
            <div class="p-6">
                <form method="post" action="{% url 'account_reset_password' %}">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
                        <input type="email" name="email" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-700">
                    </div>
                    
                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition">
                        Send reset link
                    </button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="text-sm text-gray-600">
                        Remember your password?
                        <a href="{% url 'account_login' %}" class="text-blue-700 hover:underline">Sign in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
