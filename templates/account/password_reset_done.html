{% extends 'base.html' %}
{% load static %}

{% block auth_content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div class="font-bold text-2xl text-green-800">SmartSeason</div>
            <div class="text-gray-500 text-sm mt-1">Field Monitoring System</div>
        </div>
        
        <div class="bg-white border border-gray-200 rounded-md shadow-sm overflow-hidden">
            <div class="px-6 py-4 bg-green-600">
                <h2 class="text-lg font-semibold text-white">Check your email</h2>
            </div>
            
            <div class="p-6 text-center">
                <p class="text-gray-700 mb-4">
                    We've sent you an email with a link to reset your password.
                </p>
                <p class="text-sm text-gray-500">
                    Didn't receive the email? 
                    <a href="{% url 'account_reset_password' %}" class="text-green-700 hover:underline">Try again</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
